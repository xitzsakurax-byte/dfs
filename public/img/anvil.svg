<svg viewBox="0 0 140 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- GermanForge — anvil & hammer with sparks (original brand mark) -->
  <g stroke="#D4A017" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- anvil top with horn -->
    <path d="M24 46 h64 q20 0 26 -12 h-17 q-5 7 -15 7 h-58 z" fill="rgba(212,160,23,0.12)"/>
    <!-- waist -->
    <path d="M46 46 l-4 14 h36 l-4 -14"/>
    <!-- foot -->
    <path d="M40 60 l-8 16 h56 l-8 -16"/>
    <!-- base line -->
    <line x1="28" y1="84" x2="96" y2="84"/>
  </g>
  <g stroke="#F0BA30" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- hammer head -->
    <path d="M88 14 l16 16 l9 -9 l-16 -16 z" fill="rgba(240,186,48,0.14)"/>
    <!-- handle -->
    <line x1="90" y1="26" x2="72" y2="44"/>
    <!-- sparks -->
    <line x1="58" y1="28" x2="52" y2="20"/>
    <line x1="66" y1="22" x2="64" y2="12"/>
    <line x1="48" y1="38" x2="38" y2="34"/>
  </g>
</svg>

<svg viewBox="0 0 140 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- GermanForge — Brandenburg Gate line art (original) -->
  <g stroke="#D4A017" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- ground line -->
    <line x1="6" y1="102" x2="134" y2="102"/>
    <!-- column bases -->
    <line x1="14" y1="96" x2="30" y2="96"/>
    <line x1="38" y1="96" x2="54" y2="96"/>
    <line x1="62" y1="96" x2="78" y2="96"/>
    <line x1="86" y1="96" x2="102" y2="96"/>
    <line x1="110" y1="96" x2="126" y2="96"/>
    <!-- columns -->
    <line x1="18" y1="58" x2="18" y2="96"/>
    <line x1="26" y1="58" x2="26" y2="96"/>
    <line x1="42" y1="58" x2="42" y2="96"/>
    <line x1="50" y1="58" x2="50" y2="96"/>
    <line x1="66" y1="58" x2="66" y2="96"/>
    <line x1="74" y1="58" x2="74" y2="96"/>
    <line x1="90" y1="58" x2="90" y2="96"/>
    <line x1="98" y1="58" x2="98" y2="96"/>
    <line x1="114" y1="58" x2="114" y2="96"/>
    <line x1="122" y1="58" x2="122" y2="96"/>
    <!-- entablature -->
    <rect x="10" y="46" width="120" height="12" rx="1"/>
    <!-- attic -->
    <rect x="26" y="34" width="88" height="12" rx="1"/>
  </g>
  <g stroke="#F0BA30" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- quadriga: chariot base -->
    <line x1="56" y1="30" x2="84" y2="30"/>
    <!-- wheel -->
    <circle cx="62" cy="26" r="4"/>
    <!-- horses (abstract arcs) -->
    <path d="M44 30 q4 -10 12 -8"/>
    <path d="M50 30 q4 -8 11 -7"/>
    <!-- victoria with staff -->
    <line x1="78" y1="30" x2="78" y2="14"/>
    <circle cx="78" cy="10" r="3.4"/>
    <!-- wings -->
    <path d="M78 17 q-7 -2 -10 -7"/>
    <path d="M78 17 q7 -2 10 -7"/>
  </g>
</svg>
